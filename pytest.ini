[pytest]
# Pytest configuration file

# Where to look for tests
testpaths = tests

# Patterns for test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    # Show verbose output
    -v
    # Show summary of all test outcomes
    -ra
    # Show local variables in tracebacks
    --tb=short
    # Coverage options (uncomment when you want coverage reports)
    # --cov=backend
    # --cov=aruco
    # --cov-report=html
    # --cov-report=term-missing

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, test multiple components)
    api: Tests that call external APIs (require credentials)
    slow: Slow tests (may be skipped in quick test runs)

# Ignore directories
norecursedirs = .git .tox dist build *.egg venv
