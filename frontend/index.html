<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner</title>
    <link rel="stylesheet" href="css/horizontal.css">
</head>
<body>
    <!-- User Selection Screen: full-bleed picture buttons -->
    <div id="user-selection-screen" class="screen active">
        <div class="user-selection-container">
            <button class="user-button user-picture-button" data-user-id="spencer" type="button">
                <img class="user-picture-img" src="images/SAR_Bird2.png" alt="">
                <span class="user-picture-veil" aria-hidden="true"></span>
                <span class="user-picture-gradient"></span>
                <span class="user-picture-name">Spencer</span>
            </button>
            <button class="user-button user-picture-button" data-user-id="celeste" type="button">
                <img class="user-picture-img" src="images/CB_Bird2.png" alt="">
                <span class="user-picture-veil" aria-hidden="true"></span>
                <span class="user-picture-gradient"></span>
                <span class="user-picture-name">Celeste</span>
            </button>
        </div>
    </div>

    <!-- Capture Screen -->
    <div id="capture-screen" class="screen">
        <div class="split-layout">
            <!-- Left: Camera Preview (70%) -->
            <div class="preview-section">
                <div class="preview-wrapper">
                    <img id="preview-image" src="" alt="Camera preview">
                </div>
            </div>
            
            <!-- Right: Controls (30%) -->
            <div class="controls-section">
                <div class="status-panel">
                    <div class="page-count-display">
                        <div class="page-count-number" id="page-counter-num">0</div>
                        <div class="page-count-label">PAGES</div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button id="capture-button" class="btn-action btn-capture">
                        <span class="btn-icon">📸</span>
                        <span class="btn-text">CAPTURE</span>
                    </button>
                    
                    <button id="done-button" class="btn-action btn-done">
                        <span class="btn-icon">✓</span>
                        <span class="btn-text">DONE</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Screen -->
    <div id="review-screen" class="screen">
        <div class="review-layout">
            <h2 class="review-title">REVIEW CAPTURED PAGES</h2>
            <p class="review-tap-hint">Tap an image to rotate 180°</p>
            <div id="review-grid" class="review-grid-horizontal">
                <!-- Images will be inserted here -->
            </div>
            <div class="review-controls-horizontal">
                <button id="process-button" class="btn-review btn-process">
                    <span class="btn-icon">🚀</span>
                    <span>PROCESS ALL PAGES</span>
                </button>
                <button id="cancel-button" class="btn-review btn-cancel">
                    <span class="btn-icon">✕</span>
                    <span>CANCEL</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Processing Screen -->
    <div id="processing-screen" class="screen">
        <div class="processing-container">
            <div class="spinner-large"></div>
            <div id="processing-progress" class="processing-text">Processing...</div>
        </div>
    </div>

    <!-- Success Screen -->
    <div id="success-screen" class="screen">
        <div class="success-container">
            <div class="success-icon">✓</div>
            <div class="success-text">Successfully uploaded to Notion!</div>
            <div id="success-details" class="success-details"></div>
        </div>
    </div>

    <!-- Error Screen -->
    <div id="error-screen" class="screen">
        <div class="error-container">
            <div class="error-icon">⚠</div>
            <h2 class="error-title">Error</h2>
            <div id="error-message" class="error-message"></div>
            <button id="error-ok-button" class="btn-error-ok">OK</button>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
